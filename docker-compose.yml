services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: wakala
      POSTGRES_PASSWORD: wakala
      POSTGRES_DB: wakala_connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakala -d wakala_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
